<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Cat Pet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="desktop" aria-label="A cute desktop-style virtual cat pet">
      <div id="cat" class="cat idle" aria-label="Virtual cat pet">
        <img class="cat__layer" data-pose="idle"       src="assets/sprites/cat_03.png" alt="" />
        <img class="cat__layer" data-pose="walking"    src="assets/sprites/cat_01.png" alt="" />
        <img class="cat__layer" data-pose="sleeping"   src="assets/sprites/cat_02.png" alt="" />
        <img class="cat__layer" data-pose="playing"    src="assets/sprites/cat_04.png" alt="" />
        <img class="cat__layer" data-pose="stretching" src="assets/sprites/cat_06.png" alt="" />
        <div id="cat-hitbox" class="cat__hitbox" role="button" tabindex="0" aria-label="Pet the cat"></div>
      </div>
      <ul id="cat-menu" class="cat-menu" role="menu" hidden></ul>
    </main>

    <script src="script.js"></script>
  </body>
</html>
